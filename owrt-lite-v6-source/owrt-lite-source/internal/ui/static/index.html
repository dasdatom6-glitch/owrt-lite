<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Owrt-Lite</title><style>
:root{--bg:#eef2f7;--card:#ffffff;--text:#17202a;--muted:#667085;--line:#d8dee8;--accent:#1769e0;--accent2:#0f4fb3;--ok:#16803c;--bad:#b42318;--warn:#a15c07;--shadow:0 18px 45px rgba(15,23,42,.10)}
*{box-sizing:border-box}html,body{min-height:100%}body{margin:0;background:linear-gradient(180deg,#eef2f7 0%,#f8fafc 100%);color:var(--text);font:14px/1.5 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,select,input,textarea{font:inherit;border:1px solid var(--line);border-radius:10px;padding:9px 11px;background:#fff;color:var(--text);outline:none}input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(23,105,224,.12)}button{cursor:pointer;background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}button:hover{background:var(--accent2)}button.secondary{background:#fff;color:var(--text)}button.secondary:hover{background:#f8fafc}button.danger{background:var(--bad);border-color:var(--bad)}
.login{width:min(440px,calc(100vw - 32px));margin:0;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);padding:28px!important;border-radius:18px!important;box-shadow:var(--shadow);border:1px solid rgba(216,222,232,.9)}.login h1{margin:0 0 8px;font-size:26px}.login:before{content:"";display:block;width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#5aa2ff);margin-bottom:16px}.login .stack{gap:12px}.login button{width:100%;padding:11px 14px}.login input{padding:12px 13px}
.shell{display:grid;grid-template-columns:236px 1fr;min-height:100vh}.drawer{background:#0f172a;color:#e5e7eb;padding:18px;position:sticky;top:0;height:100vh;box-shadow:8px 0 28px rgba(15,23,42,.12)}.drawer h1{font-size:20px;margin:0 0 20px;letter-spacing:.2px}.nav{display:grid;gap:8px}.nav button{background:transparent;border:1px solid #334155;color:#e5e7eb;text-align:left;border-radius:10px}.nav button:hover{background:#1e293b}.nav button.active{background:var(--accent);border-color:var(--accent);color:#fff}.main{min-width:0}.top{position:sticky;top:0;background:rgba(248,250,252,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);z-index:2}.topin{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px 18px}.content{padding:0 18px 24px;max-width:1220px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin:16px 0;box-shadow:0 8px 24px rgba(15,23,42,.05)}.card h2{font-size:17px;margin:0 0 12px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.stack{display:grid;gap:10px}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.full{grid-column:1/-1}.muted{color:var(--muted)}.small{font-size:12px}.ok{color:var(--ok)}.bad{color:var(--bad)}.warn{color:var(--warn)}.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:3px 9px;margin:2px;color:var(--muted);background:#fff}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:top}th{background:#f8fafc;color:var(--muted);font-weight:700}tr.active{background:#eef5ff}.hidden{display:none!important}.logs{height:260px;overflow:auto;background:#0f172a;color:#dbeafe;border-radius:12px;padding:12px;font:12px ui-monospace,Consolas,monospace;white-space:pre-wrap}textarea{width:100%;min-height:120px}.hint{background:#fff8e5;border:1px solid #f2d28b;border-radius:12px;padding:10px}.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:9}.modal .card{max-width:560px;margin:16px}.menuBtn{display:none}
@media(max-width:850px){.shell{grid-template-columns:1fr}.drawer{position:fixed;z-index:8;transform:translateX(-105%);transition:.2s;width:260px}.drawer.open{transform:translateX(0)}.menuBtn{display:inline-block}.form{grid-template-columns:1fr}table{display:block;overflow:auto}.topin{align-items:flex-start}.content{padding:0 12px 20px}}
</style></head><body>
<section id="login" class="login card"><h1>Owrt-Lite 登录</h1><p class="muted">默认密码 admin。为安全起见，每次程序启动都需要重新登录。</p><div class="stack"><input id="password" type="password" value="admin" placeholder="密码"><button id="loginBtn">登录</button><div id="loginMsg" class="bad small"></div></div></section>
<main id="app" class="shell hidden"><aside id="drawer" class="drawer"><h1>Owrt-Lite</h1><div class="nav"><button data-page="nodes" class="active">节点管理</button><button data-page="proxy">系统代理 / IP</button><button data-page="pool">代理池轮换</button><button data-page="chains">代理链轮转</button><button data-page="settings">设置 / 账号</button><button data-page="logs">日志 / 统计</button></div></aside><section class="main"><div class="top"><div class="topin"><div class="row"><button class="secondary menuBtn" id="menuBtn">菜单</button><b id="pageTitle">节点管理</b><span id="summary" class="muted small"></span></div><div class="row"><button class="secondary" id="refreshBtn">刷新</button><button class="secondary" id="logoutBtn">退出登录</button><button class="danger" id="exitBtn">退出程序</button></div></div></div><div class="content">
<section id="page-nodes" class="page"><div class="card"><div class="row"><button id="nextBtn">更换到下一个节点</button><button class="secondary" id="testAllBtn">全部测速</button><button class="secondary" id="selectAllBtn">全选</button><button class="danger" id="deleteSelectedBtn">删除选中</button></div><p class="muted small">切换节点会自动确保系统代理已启用，并关闭旧隧道。</p><div id="nodes"></div></div><div class="card"><h2>导入 / 添加 / 保存</h2><textarea id="importText" placeholder="粘贴 ss://、trojan://、socks5://、http://、Clash YAML 或 JSON"></textarea><div class="row"><button id="importBtn">导入节点</button><button class="secondary" id="exportBtn">导出节点</button><button class="secondary" id="saveNodesBtn">保存现有节点</button><button class="secondary" id="loadNodesBtn">载入已保存节点</button><button class="secondary" id="clearSavedBtn">清除保存记录</button><button class="danger" id="clearBtn">清空当前节点</button></div><details style="margin-top:12px"><summary>手动添加节点</summary><div class="form" style="margin-top:10px"><input id="mName" placeholder="名称"><select id="mScheme"><option value="ss">Shadowsocks</option><option value="socks5">SOCKS5</option><option value="http">HTTP</option><option value="https">HTTPS</option><option value="trojan">Trojan</option></select><input id="mHost" placeholder="服务器"><input id="mPort" placeholder="端口"><input id="mCipher" placeholder="SS 加密方式"><input id="mPassword" placeholder="密码"><button class="full" id="manualBtn">添加</button></div></details></div></section>
<section id="page-proxy" class="page hidden"><div class="card"><h2>系统代理与 IP 检测</h2><div class="stack"><div class="hint small">Windows 代理设置应显示地址 <b>127.0.0.1</b> 和端口；如果显示 http=... 说明运行的是旧版本，请用本版“一键修复系统代理”。</div><label>模式</label><select id="proxyMode"><option value="off">关闭系统代理</option><option value="global">全局代理</option><option value="rule">规则代理</option></select><div class="row"><button id="setModeBtn">应用/保存</button><button class="secondary" id="reapplyProxyBtn">一键修复系统代理</button><button class="secondary" id="ipBtn">检测当前 IP</button></div><div class="row"><div><div class="muted small">直连 IP</div><b id="directIp">-</b></div><div><div class="muted small">代理 IP</div><b id="proxyIp">-</b></div></div><div id="ipResult" class="small muted"></div></div></div></section>
<section id="page-pool" class="page hidden"><div class="card"><h2>代理池自动轮换</h2><div id="poolChecks" class="small"></div><div class="row"><input id="poolInterval" value="60s"><select id="poolMode"><option value="seq">顺序</option><option value="random">随机</option></select><button id="startPoolBtn">启动</button><button class="secondary" id="stopPoolBtn">停止</button></div></div></section>
<section id="page-chains" class="page hidden"><div class="card"><h2>保存代理链</h2><input id="chainName" placeholder="代理链名称"><div id="chainChecks" class="small"></div><button id="saveChainBtn">保存代理链</button><div id="savedChains" class="small"></div></div><div class="card"><h2>代理链轮转</h2><div id="chainRotateChecks" class="small"></div><div class="row"><input id="chainInterval" value="120s"><select id="chainMode"><option value="seq">顺序</option><option value="random">随机</option></select><button id="startChainBtn">启动</button><button class="secondary" id="stopChainBtn">停止</button></div></div></section>
<section id="page-settings" class="page hidden"><div class="card"><h2>系统与保存设置</h2><label><input type="checkbox" id="autoSysProxy"> 启动时自动设置系统代理</label><br><label><input type="checkbox" id="autoSaveNodes"> 自动保存节点变化</label><p class="small muted">默认关闭自动保存，避免“不保存退出”后仍保留新节点。</p><button id="saveSettingsBtn">保存设置</button></div><div class="card"><h2>修改密码</h2><div class="row"><input id="newPassword" type="password" placeholder="新密码"><button id="changePwdBtn">修改密码</button></div></div><div class="card"><h2>备忘录</h2><textarea id="memo"></textarea><button id="saveMemoBtn">保存备忘录</button></div></section>
<section id="page-logs" class="page hidden"><div class="card"><h2>统计</h2><div id="stats"></div></div><div class="card"><h2>日志</h2><div id="logs" class="logs"></div></div></section><div id="toast" class="small muted"></div></div></section></main>
<div id="exitModal" class="modal hidden"><div class="card"><h2>退出前确认</h2><div class="stack"><button id="exitSaveBtn">保存当前节点并退出</button><button class="secondary" id="exitOnlyBtn">仅退出（不再保存，保留以前保存记录）</button><button class="danger" id="exitClearBtn">不保存并清除本地节点记录后退出</button><button class="secondary" id="exitExportBtn">先导出节点</button><button class="secondary" id="exitCancelBtn">取消</button></div></div></div>
<script>
const $=id=>document.getElementById(id);let state={},savedChains=[];const api=async(p,o={})=>{let r=await fetch(p,{credentials:'same-origin',...o});if(r.status===401){showLogin();throw Error('未登录')}if(!r.ok)throw Error(await r.text()||r.statusText);return r};const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));function toast(m,b=false){$('toast').className='small '+(b?'bad':'ok');$('toast').textContent=m;setTimeout(()=>$('toast').textContent='',5000)}function showLogin(){$('login').classList.remove('hidden');$('app').classList.add('hidden')}function showApp(){$('login').classList.add('hidden');$('app').classList.remove('hidden')}async function login(){try{await fetch('/login',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:$('password').value})}).then(r=>{if(!r.ok)throw Error('密码错误')});showApp();await loadAll()}catch(e){$('loginMsg').textContent=e.message}}
async function loadAll(){state=await api('/node/list').then(r=>r.json());try{savedChains=await api('/node/chain/saved').then(r=>r.json())}catch{savedChains=[]}render();loadMemo()}function render(){let st=state.settings||{},stats=state.stats||{};$('summary').textContent=`节点 ${stats.total_nodes||0} 健康 ${stats.healthy_nodes||0} 当前 ${state.active||'未选择'} 池:${state.status?.auto_rotate?'运行':'停'} 链:${state.status?.chain_rotate?'运行':'停'}`;$('proxyMode').value=state.proxy_mode||'off';$('autoSysProxy').checked=!!st.auto_system_proxy;$('autoSaveNodes').checked=!!st.auto_save_nodes;$('stats').innerHTML=Object.entries(stats).map(([k,v])=>`<span class=badge>${k}: ${v}</span>`).join('');$('logs').textContent=(state.logs||[]).slice().reverse().join('\n');let rows=(state.nodes||[]).map(n=>`<tr class="${n.id===state.active?'active':''}"><td><input type="checkbox" class="nodePick" value="${n.id}"></td><td><b>${esc(n.name||n.id)}</b><br><span class=small>${n.id}</span></td><td>${esc(n.runtime_status||'空闲')}</td><td>${esc(n.type)} ${n.type==='vmess'?'<span class=warn>不建议</span>':''}</td><td>${esc(n.host)}:${esc(n.port)}</td><td>${n.healthy?'<span class=ok>健康</span>':'<span class=bad>异常</span>'}</td><td>${n.latency||'-'}ms</td><td><button class=secondary onclick="selectNode('${n.id}')">切换</button> <button class=secondary onclick="testNode('${n.id}')">测速</button> <button class=danger onclick="deleteNode('${n.id}')">删</button></td></tr>`).join('');$('nodes').innerHTML=rows?`<table><thead><tr><th><input id="headPick" type="checkbox" onchange="toggleAll(this.checked)"></th><th>名称</th><th>运行状态</th><th>类型</th><th>服务器</th><th>健康</th><th>延迟</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>`:'<p class=muted>暂无节点</p>';let labels=(cls)=>(state.nodes||[]).map(n=>`<label class=badge><input type=checkbox class="${cls}" value="${n.id}"> ${esc(n.name||n.id)}</label>`).join(' ');$('poolChecks').innerHTML=labels('poolPick');$('chainChecks').innerHTML=labels('chainPick');$('savedChains').innerHTML=(savedChains||[]).map(c=>`<div class=badge>${esc(c.name)}: ${esc(c.node_ids.join(' -> '))} <button class=secondary onclick="applyChain('${c.node_ids.join(',')}')">应用</button> <button class=danger onclick="delChain('${c.id}')">删</button></div>`).join('')||'<span class=muted>暂无代理链</span>';$('chainRotateChecks').innerHTML=(savedChains||[]).map(c=>`<label class=badge><input type=checkbox class=chainRotatePick value="${c.id}"> ${esc(c.name)}</label>`).join('')||'<span class=muted>先保存代理链</span>'}
function page(name){document.querySelectorAll('.page').forEach(x=>x.classList.add('hidden'));$('page-'+name).classList.remove('hidden');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===name));$('pageTitle').textContent=document.querySelector(`[data-page="${name}"]`).textContent;$('drawer').classList.remove('open')}document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>page(b.dataset.page));$('menuBtn').onclick=()=>$('drawer').classList.toggle('open');function ids(cls){return[...document.querySelectorAll('.'+cls+':checked')].map(x=>x.value)}function toggleAll(v){document.querySelectorAll('.nodePick').forEach(x=>x.checked=v)}async function ensureProxy(){if((state.proxy_mode||'off')==='off'){await api('/system/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'rule'})})}else{await api('/system/proxy/reapply',{method:'POST'})}}
async function selectNode(id){await api('/node/active',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});await ensureProxy();toast('已切换节点并修复系统代理，正在检测 IP');await loadAll();await detectIP()}async function nextNode(){await api('/node/next',{method:'POST'});await ensureProxy();toast('已切换下一个');await loadAll();await detectIP()}async function testNode(id){let ms=await api('/node/speedtest?id='+id).then(r=>r.text());toast(ms==='-1'?'测速失败':'测速 '+ms+'ms',ms==='-1');await loadAll()}async function deleteNode(id){if(confirm('删除节点?')){await api('/node/delete?id='+id,{method:'POST'});await loadAll()}}async function deleteSelected(){let a=ids('nodePick');if(!a.length)return toast('未选择节点',true);if(confirm('删除选中 '+a.length+' 个节点?')){let n=await api('/node/delete/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:a})}).then(r=>r.text());toast('已删除 '+n+' 个节点');await loadAll()}}async function importNodes(){let t=$('importText').value.trim();if(!t)return toast('请粘贴节点',true);let n=await api('/node/import',{method:'POST',headers:{'Content-Type':'text/plain'},body:t}).then(r=>r.text());toast('导入 '+n+' 个');$('importText').value='';await loadAll()}async function addManual(){let b={name:$('mName').value,scheme:$('mScheme').value,host:$('mHost').value,port:$('mPort').value,password:$('mPassword').value,cipher:$('mCipher').value};await api('/node/add/manual',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});toast('已添加');await loadAll()}function exportNodes(){location.href='/node/export'}async function saveNodes(){await api('/node/save',{method:'POST'});toast('已保存节点')}async function loadNodes(){await api('/node/load',{method:'POST'});toast('已载入');await loadAll()}async function clearSaved(){if(confirm('清除 nodes_state.json？')){await api('/node/save',{method:'DELETE'});toast('已清除保存记录')}}async function clearNodes(){if(confirm('清空当前节点?')){await api('/node/clear',{method:'POST'});await loadAll()}}
async function setMode(){let mode=$('proxyMode').value;await api('/system/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode})});await saveSettings(false);toast('系统代理已应用')}async function reapplyProxy(){await api('/system/proxy/reapply',{method:'POST'});toast('已重新写入系统代理')}async function saveSettings(msg=true){await api('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({auto_system_proxy:$('autoSysProxy').checked,startup_proxy_mode:$('proxyMode').value,auto_save_nodes:$('autoSaveNodes').checked})});if(msg)toast('设置已保存');await loadAll()}async function detectIP(){$('directIp').textContent='检测中';$('proxyIp').textContent='检测中';let direct='-',proxy='-';try{direct=(await api('/diagnose/direct-ip').then(r=>r.json())).ip||'-'}catch(e){direct='失败'}try{proxy=(await api('/diagnose/ip').then(r=>r.json())).ip||'-'}catch(e){proxy='失败'}$('directIp').textContent=direct;$('proxyIp').textContent=proxy;$('ipResult').textContent=(direct!=='失败'&&proxy!=='失败'&&direct!==proxy)?'代理 IP 与直连不同，代理生效':'如果两者相同，可能节点未生效、出口相同或节点协议不支持'}
async function startPool(){await api('/node/rotate/auto',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enable:true,interval:$('poolInterval').value,pool:ids('poolPick'),loop:$('poolMode').value==='seq'})});toast('代理池已启动');await loadAll()}async function stopPool(){await api('/node/rotate/auto',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enable:false})});await loadAll()}async function saveChain(){let a=ids('chainPick');if(!a.length)return toast('请选择节点',true);await api('/node/chain/saved',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:$('chainName').value||'代理链',node_ids:a})});await loadAll()}async function applyChain(csv){await api('/node/chain',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(csv.split(','))});await ensureProxy();toast('链已应用');await loadAll();await detectIP()}async function delChain(id){await api('/node/chain/saved?id='+id,{method:'DELETE'});await loadAll()}async function startChain(){await api('/node/rotate/chain',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enable:true,interval:$('chainInterval').value,mode:$('chainMode').value,pool:ids('chainRotatePick')})});toast('链轮转已启动');await loadAll()}async function stopChain(){await api('/node/rotate/chain',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enable:false})});await loadAll()}async function changePwd(){let p=$('newPassword').value.trim();if(!p)return toast('请输入密码',true);await api('/api/password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:p})});$('newPassword').value='';toast('密码已修改')}async function loadMemo(){try{$('memo').value=await api('/api/memo').then(r=>r.text())}catch{}}async function saveMemo(){await api('/api/memo',{method:'POST',body:$('memo').value});toast('已保存备忘录')}async function logout(){await api('/logout',{method:'POST'});showLogin()}function showExit(){$('exitModal').classList.remove('hidden')}function hideExit(){$('exitModal').classList.add('hidden')}async function shutdown(save,clear){await api('/system/shutdown',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({save_nodes:save,clear_saved:clear})});document.body.innerHTML='<section class="login card"><h1>程序已退出</h1></section>'}
$('loginBtn').onclick=login;$('password').onkeydown=e=>{if(e.key==='Enter')login()};$('refreshBtn').onclick=loadAll;$('logoutBtn').onclick=logout;$('exitBtn').onclick=showExit;$('nextBtn').onclick=nextNode;$('testAllBtn').onclick=()=>api('/node/speedtest?id=all',{method:'POST'}).then(()=>toast('开始测速'));$('selectAllBtn').onclick=()=>toggleAll(true);$('deleteSelectedBtn').onclick=deleteSelected;$('importBtn').onclick=importNodes;$('manualBtn').onclick=addManual;$('exportBtn').onclick=exportNodes;$('saveNodesBtn').onclick=saveNodes;$('loadNodesBtn').onclick=loadNodes;$('clearSavedBtn').onclick=clearSaved;$('clearBtn').onclick=clearNodes;$('setModeBtn').onclick=setMode;$('reapplyProxyBtn').onclick=reapplyProxy;$('ipBtn').onclick=detectIP;$('saveSettingsBtn').onclick=saveSettings;$('startPoolBtn').onclick=startPool;$('stopPoolBtn').onclick=stopPool;$('saveChainBtn').onclick=saveChain;$('startChainBtn').onclick=startChain;$('stopChainBtn').onclick=stopChain;$('changePwdBtn').onclick=changePwd;$('saveMemoBtn').onclick=saveMemo;$('exitCancelBtn').onclick=hideExit;$('exitSaveBtn').onclick=()=>shutdown(true,false);$('exitOnlyBtn').onclick=()=>shutdown(false,false);$('exitClearBtn').onclick=()=>shutdown(false,true);$('exitExportBtn').onclick=exportNodes;loadAll().then(showApp).catch(showLogin);
</script></body></html>
